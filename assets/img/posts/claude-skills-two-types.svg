<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR','Segoe UI',sans-serif">
  <rect width="1200" height="560" rx="22" fill="#f8fafc"/>
  <text x="600" y="64" text-anchor="middle" font-size="34" font-weight="700" fill="#0f172a">왜 단순 복사로 안 되나 — 스킬은 두 종류</text>

  <!-- Personal skills -->
  <rect x="70" y="110" width="500" height="400" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2.5"/>
  <rect x="70" y="110" width="500" height="70" rx="18" fill="#dbeafe"/>
  <rect x="70" y="150" width="500" height="30" fill="#dbeafe"/>
  <text x="100" y="155" font-size="27" font-weight="700" fill="#1d4ed8">개인 스킬</text>
  <g font-size="23" fill="#334155">
    <text x="100" y="232">위치: ~/.claude/skills/&lt;이름&gt;/SKILL.md</text>
    <text x="100" y="286">예: blog-post, image-video-gen</text>
    <text x="100" y="340" fill="#15803d" font-weight="600">→ git에 그대로 잡힘</text>
    <text x="100" y="394" fill="#15803d" font-weight="600">→ 저장소에 push하면 공유 끝</text>
    <text x="100" y="462" font-size="21" fill="#64748b">이 폴더 전체가 동기화 대상</text>
  </g>

  <!-- Plugin skills -->
  <rect x="630" y="110" width="500" height="400" rx="18" fill="#ffffff" stroke="#fde68a" stroke-width="2.5"/>
  <rect x="630" y="110" width="500" height="70" rx="18" fill="#fef3c7"/>
  <rect x="630" y="150" width="500" height="30" fill="#fef3c7"/>
  <text x="660" y="155" font-size="27" font-weight="700" fill="#b45309">플러그인 스킬</text>
  <g font-size="23" fill="#334155">
    <text x="660" y="232">식별자: anthropic-skills:work-log …</text>
    <text x="660" y="286">위치: 플러그인 캐시(세션 경로)</text>
    <text x="660" y="340" fill="#b91c1c" font-weight="600">→ ~/.claude/skills에 없음</text>
    <text x="660" y="394" fill="#b91c1c" font-weight="600">→ git에 안 잡힘 = 복제해야 포함</text>
    <text x="660" y="462" font-size="21" fill="#64748b">필요한 것만 개인 스킬로 복사</text>
  </g>
</svg>
