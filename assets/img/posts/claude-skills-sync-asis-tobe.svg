<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR','Segoe UI',sans-serif">
  <rect width="1200" height="630" rx="22" fill="#f8fafc"/>
  <text x="600" y="74" text-anchor="middle" font-size="38" font-weight="700" fill="#0f172a">Claude Code 스킬 공유 — 변경 전 vs 변경 후</text>

  <!-- AS-IS card -->
  <rect x="70" y="118" width="470" height="468" rx="18" fill="#ffffff" stroke="#fecaca" stroke-width="2.5"/>
  <rect x="96" y="146" width="232" height="46" rx="23" fill="#fee2e2"/>
  <text x="212" y="177" text-anchor="middle" font-size="26" font-weight="700" fill="#b91c1c">AS-IS · 변경 전</text>
  <g font-size="25" fill="#334155">
    <circle cx="112" cy="252" r="6" fill="#ef4444"/><text x="134" y="261">스킬이 Mac 한 대에만 존재</text>
    <circle cx="112" cy="320" r="6" fill="#ef4444"/><text x="134" y="329">Windows엔 수동 복사 → 금방 어긋남</text>
    <circle cx="112" cy="388" r="6" fill="#ef4444"/><text x="134" y="397">플러그인 스킬은 빠짐</text>
    <circle cx="112" cy="456" r="6" fill="#ef4444"/><text x="134" y="465">절대경로 탓에 타 OS에서 안 됨</text>
    <circle cx="112" cy="524" r="6" fill="#ef4444"/><text x="134" y="533">"저장 = 공유"가 아님 (수동 작업)</text>
  </g>

  <!-- arrow -->
  <circle cx="600" cy="352" r="40" fill="#1e293b"/>
  <path d="M 583 352 H 612 M 602 340 L 616 352 L 602 364" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TO-BE card -->
  <rect x="660" y="118" width="470" height="468" rx="18" fill="#ffffff" stroke="#bbf7d0" stroke-width="2.5"/>
  <rect x="686" y="146" width="232" height="46" rx="23" fill="#dcfce7"/>
  <text x="802" y="177" text-anchor="middle" font-size="26" font-weight="700" fill="#15803d">TO-BE · 변경 후</text>
  <g font-size="25" fill="#334155">
    <circle cx="702" cy="252" r="6" fill="#22c55e"/><text x="724" y="261">GitHub 저장소 1곳에 집중</text>
    <circle cx="702" cy="320" r="6" fill="#22c55e"/><text x="724" y="329">저장하면 3분 내 자동 push</text>
    <circle cx="702" cy="388" r="6" fill="#22c55e"/><text x="724" y="397">플러그인 스킬도 복제해 포함</text>
    <circle cx="702" cy="456" r="6" fill="#22c55e"/><text x="724" y="465">모든 스킬 Mac·Windows 호환</text>
    <circle cx="702" cy="524" r="6" fill="#22c55e"/><text x="724" y="533">양방향 자동 동기화로 수렴</text>
  </g>
</svg>
